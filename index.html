<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>С Днём Рождения, Илона!</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: #fff;
      overflow-x: hidden;
    }

    body {
      background: linear-gradient(rgba(0,20,50,0.4), rgba(0,20,50,0.4)),
                  url('more.webp') center center / cover no-repeat;
      background-attachment: scroll;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }

    .layout {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 40px;
      width: 100%;
      max-width: 1100px;
    }

    .photo {
      border-radius: 14px;
      border: 2px solid rgba(212,175,106,0.7);
      box-shadow: 0 10px 35px rgba(0,0,0,0.6);
      display: block;
      object-fit: contain;
      max-height: 80vh;
      width: auto;
      max-width: 220px;
    }

    .center {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      flex: 1;
      min-width: 0;
    }

    .sparkles { color: #f5e0a0; letter-spacing: 12px; font-size: 1.1rem; }
    .subtitle { font-style: italic; font-size: 1.4rem; color: #a8e6f0; letter-spacing: 4px; }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 6.5rem;
      font-weight: 700;
      letter-spacing: 6px;
      line-height: 1;
      background: linear-gradient(135deg, #fff 20%, #f5e0a0 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(212,175,106,0.9));
    }

    .bigdate {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 2rem;
      color: #f5e0a0;
      text-shadow: 0 2px 14px rgba(212,175,106,0.9);
    }

    .poem {
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 16px;
      padding: 22px 28px;
      font-style: italic;
      font-size: 1.25rem;
      line-height: 2;
      color: #fdf8f0;
      width: 100%;
    }

    .wish {
      font-style: italic;
      font-size: 1.2rem;
      color: #f5e0a0;
      text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    }

    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
        gap: 20px;
      }

      .photo {
        max-width: 140px;
        max-height: 180px;
      }

      .center { width: 100%; gap: 12px; }
      .name { font-size: 3.5rem; }
      .bigdate { font-size: 1.4rem; }
      .subtitle { font-size: 1rem; letter-spacing: 2px; }
      .poem { font-size: 0.95rem; line-height: 1.8; padding: 14px 16px; }
      .wish { font-size: 0.95rem; }
      .sparkles { letter-spacing: 8px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <img src="i1.png" class="photo" alt=""/>
    <div class="center">
      <div class="sparkles">✦ ✧ ✦</div>
      <p class="subtitle">Дорогая подруга</p>
      <h1 class="name">Илона</h1>
      <p class="bigdate">С Днём Рождения!</p>
      <div class="poem">
        🌹 Пусть восхищает каждое мгновение,<br/>
        удачей радует, приятно удивляет,<br/>
        всегда чудесным будет настроение,<br/>
        и близкие любовью согревают! 🌹
      </div>
      <p class="wish">Море счастья и бесконечное лето в душе! 🌊💕</p>
      <div class="sparkles">✦ ✧ ✦</div>
    </div>
    <img src="il.png" class="photo" alt=""/>
  </div>
</body>
</html>
